<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Desafio Mobile</title>
    <style>
        /* CSS: Trava o movimento da tela e ajusta o tamanho */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #1a1a1a;
            color: white;
            font-family: Arial, sans-serif;
            /* Evita que a tela suba/desça ao arrastar o dedo */
            touch-action: none; 
            overflow: hidden;
        }
        canvas {
            background-color: #222;
            border: 2px solid #00ff88;
            display: block;
        }
        .info {
            position: absolute;
            top: 10px;
            font-size: 20px;
            pointer-events: none; /* Não atrapalha o toque */
        }
    </script>
</head>
<body>

    <div class="info">Pontos: <span id="pontos">0</span></div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const spanPontos = document.getElementById("pontos");

        // Ajusta o tamanho do jogo para o tamanho da tela do celular
        canvas.width = window.innerWidth * 0.95;
        canvas.height = window.innerHeight * 0.8;

        let jogador = { 
            x: canvas.width / 2 - 25, 
            y: canvas.height - 70, 
            tam: 50 
        };
        
        let interrogacoes = [];
        let pontos = 0;
        let jogoAtivo = true;

        // CONTROLE TOUCH (Celular)
        canvas.addEventListener("touchmove", (e) => {
            if (!jogoAtivo) return;
            // Pega a posição do toque relativa ao canvas
            let touch = e.touches[0];
            let rect = canvas.getBoundingClientRect();
            let touchX = touch.clientX - rect.left;
            
            // Centraliza o quadrado no dedo
            jogador.x = touchX - jogador.tam / 2;

            // Evita que o quadrado saia das bordas
            if (jogador.x < 0) jogador.x = 0;
            if (jogador.x > canvas.width - jogador.tam) jogador.x = canvas.width - jogador.tam;
            
            e.preventDefault(); // Impede a tela de rolar
        }, { passive: false });

        function criarInterrogacao() {
            if (Math.random() < 0.04) { 
                interrogacoes.push({
                    x: Math.random() * (canvas.width - 30),
                    y: -30,
                    vel: 4 + (pontos / 8)
                });
            }
        }

        function atualizar() {
            if (!jogoAtivo) return;

            for (let i = interrogacoes.length - 1; i >= 0; i--) {
                let p = interrogacoes[i];
                p.y += p.vel;

                // Colisão aprimorada
                if (p.y + 20 > jogador.y && 
                    p.x > jogador.x - 10 && 
                    p.x < jogador.x + jogador.tam + 10) {
                    jogoAtivo = false;
                    alert("Game Over! Pontos: " + pontos);
                    location.reload();
                }

                // Ponto quando cai no final
                if (p.y > canvas.height) {
                    interrogacoes.splice(i, 1);
                    pontos++;
                    spanPontos.innerText = pontos;
                }
            }
            criarInterrogacao();
        }

        function desenhar() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Jogador (Azul Neon para destacar)
            ctx.fillStyle = "#00d2ff";
            ctx.fillRect(jogador.x, jogador.y, jogador.tam, jogador.tam);

            // Inimigos (Interrogações vermelhas)
            ctx.fillStyle = "#ff4444";
            ctx.font = "bold 40px Arial";
            interrogacoes.forEach(p => {
                ctx.fillText("?", p.x, p.y);
            });

            atualizar();
            requestAnimationFrame(desenhar);
        }

        desenhar();
    </script>
</body>

</body>
</html>
