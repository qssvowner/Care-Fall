<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulador de Banimento</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #111;
    color: white;
    text-align: center;
}

h1 {
    color: red;
}

input {
    padding: 8px;
    border-radius: 5px;
    border: none;
}

button {
    padding: 8px 12px;
    border-radius: 5px;
    border: none;
    cursor: pointer;
    margin-left: 5px;
}

.criar {
    background: green;
    color: white;
}

.banir {
    background: red;
    color: white;
}

.lista {
    margin-top: 20px;
}

.card {
    background: #222;
    padding: 10px;
    margin: 10px auto;
    width: 250px;
    border-radius: 8px;
}
</style>
</head>
<body>

<h1>🎮 Simulador de Dono</h1>

<h3>Criar Conta</h3>
<input type="text" id="nick" placeholder="Digite seu nick">
<button class="criar" onclick="criarConta()">Criar</button>

<div class="lista">
    <h3>👥 Jogadores</h3>
    <div id="jogadores"></div>
</div>

<div class="lista">
    <h3>🚫 Banidos</h3>
    <div id="banidos"></div>
</div>

<script>
let jogadores = [];
let banidos = [];

function criarConta() {
    let nick = document.getElementById("nick").value.trim();
    if(nick === "") return alert("Digite um nick!");

    jogadores.push(nick);
    document.getElementById("nick").value = "";
    atualizarLista();
}

function banir(index) {
    let nickBanido = jogadores[index];
    banidos.push(nickBanido);
    jogadores.splice(index, 1);
    atualizarLista();
}

function atualizarLista() {
    let listaJogadores = document.getElementById("jogadores");
    let listaBanidos = document.getElementById("banidos");

    listaJogadores.innerHTML = "";
    listaBanidos.innerHTML = "";

    jogadores.forEach((nick, index) => {
        listaJogadores.innerHTML += `
            <div class="card">
                ${nick}
                <button class="banir" onclick="banir(${index})">Banir</button>
            </div>
        `;
    });

    banidos.forEach(nick => {
        listaBanidos.innerHTML += `
            <div class="card" style="background:#400;">
                ${nick}
            </div>
        `;
    });
}
</script>

</body>
</html>
