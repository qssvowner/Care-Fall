<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Square Game</title>
    <style>
        /* CSS: Força o jogo a ser a única coisa na tela */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden; /* Impede que apareça barra de rolagem ou texto sobrando */
            touch-action: none;
        }
        canvas {
            background-color: #000;
            border: 1px solid #333;
        }
        #score {
            position: absolute;
            top: 20px;
            color: #fff;
            font-family: monospace;
            font-size: 20px;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="score">PONTOS: 0</div>
    <canvas id="gameCanvas"></canvas>

    <script>
        // Todo o jogo fica EXCLUSIVAMENTE dentro desta tag script
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let score = 0;
        let gameActive = true;
        let obstacles = [];
        let player = { x: canvas.width / 2, y: canvas.height - 80, size: 25 };

        function move(e) {
            if (!gameActive) return;
            let touchX = e.touches ? e.touches[0].clientX : e.clientX;
            player.x = touchX - player.size / 2;
            if (player.x < 0) player.x = 0;
            if (player.x > canvas.width - player.size) player.x = canvas.width - player.size;
        }

        canvas.addEventListener("touchmove", (e) => { move(e); e.preventDefault(); }, { passive: false });
        canvas.addEventListener("touchstart", (e) => { move(e); e.preventDefault(); }, { passive: false });
        canvas.addEventListener("mousemove", move);

        function update() {
            if (!gameActive) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Desenha Jogador
            ctx.fillStyle = "#fff";
            ctx.fillRect(player.x, player.y, player.size, player.size);

            // Gerar e mover obstáculos
            if (Math.random() < 0.06) {
                obstacles.push({ x: Math.random() * (canvas.width - 20), y: -20, speed: 5 + (score/10) });
            }

            ctx.fillStyle = "#888";
            ctx.font = "30px Arial";
            for (let i = obstacles.length - 1; i >= 0; i--) {
                let o = obstacles[i];
                o.y += o.speed;
                ctx.fillText("?", o.x, o.y);

                // Colisão
                if (o.y > player.y && o.y < player.y + player.size && o.x > player.x - 10 && o.x < player.x + player.size) {
                    gameActive = false;
                    alert("FIM DE JOGO! Pontos: " + score);
                    location.reload();
                }

                // Ponto
                if (o.y > canvas.height) {
                    obstacles.splice(i, 1);
                    score++;
                    scoreElement.innerText = "PONTOS: " + score;
                }
            }
            requestAnimationFrame(update);
        }
        update();
    </script>
</body>
</html>
