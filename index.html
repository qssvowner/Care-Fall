<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Meu Jogo Mobile</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            color: white;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            touch-action: none; /* Trava o scroll da página */
        }
        #game-container {
            position: relative;
            border: 3px solid #00ff88;
        }
        canvas {
            display: block;
            background-color: #222;
        }
        .placar {
            position: absolute;
            top: -35px;
            left: 0;
            font-size: 22px;
            font-weight: bold;
            color: #00ff88;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div class="placar">PONTOS: <span id="pontos">0</span></div>
        <canvas id="gameCanvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const spanPontos = document.getElementById("pontos");

        // Ajuste de tamanho dinâmico
        canvas.width = window.innerWidth * 0.9;
        canvas.height = window.innerHeight * 0.7;

        let pontos = 0;
        let jogoAtivo = true;
        let interrogacoes = [];

        // Quadrado (Jogador)
        let jogador = {
            x: canvas.width / 2 - 25,
            y: canvas.height - 60,
            tam: 50,
            cor: "#00d2ff"
        };

        // CONTROLE TOUCH CORRIGIDO
        function mover(e) {
            if (!jogoAtivo) return;
            
            let touchX;
            if (e.touches) {
                // Mobile
                touchX = e.touches[0].clientX - canvas.getBoundingClientRect().left;
            } else {
                // Mouse (para testar no PC)
                touchX = e.clientX - canvas.getBoundingClientRect().left;
            }

            jogador.x = touchX - jogador.tam / 2;

            // Limites da tela
            if (jogador.x < 0) jogador.x = 0;
            if (jogador.x > canvas.width - jogador.tam) jogador.x = canvas.width - jogador.tam;
        }

        canvas.addEventListener("touchmove", (e) => {
            mover(e);
            e.preventDefault();
        }, { passive: false });

        canvas.addEventListener("mousemove", mover);

        function criarInimigo() {
            if (Math.random() < 0.05) {
                interrogacoes.push({
                    x: Math.random() * (canvas.width - 30),
                    y: -40,
                    vel: 3 + (pontos / 10),
                    texto: "?"
                });
            }
        }

        function loop() {
            if (!jogoAtivo) return;

            // Limpa a tela com uma cor escura para garantir que não fique cinza
            ctx.fillStyle = "#222";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Desenha Jogador
            ctx.fillStyle = jogador.cor;
            ctx.fillRect(jogador.x, jogador.y, jogador.tam, jogador.tam);

            // Desenha e Move as Interrogações
            ctx.fillStyle = "#ff4444";
            ctx.font = "bold 40px Arial";
            
            for (let i = interrogacoes.length - 1; i >= 0; i--) {
                let p = interrogacoes[i];
                p.y += p.vel;

                ctx.fillText(p.texto, p.x, p.y);

                // Colisão
                if (p.y > jogador.y && 
                    p.x > jogador.x - 20 && 
                    p.x < jogador.x + jogador.tam) {
                    jogoAtivo = false;
                    alert("GAME OVER! Pontos: " + pontos);
                    location.reload();
                }

                // Ponto
                if (p.y > canvas.height) {
                    interrogacoes.splice(i, 1);
                    pontos++;
                    spanPontos.innerText = pontos;
                }
            }

            criarInimigo();
            requestAnimationFrame(loop);
        }

        // Inicia o loop
        loop();
    </script>
</body>
</html>
