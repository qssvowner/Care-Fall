<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Desafio da Interrogação</title>
    <style>
        /* CSS: Deixa o visual limpo e centralizado */
        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #1a1a1a;
            color: white;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }
        canvas {
            border: 4px solid #fff;
            background-color: #222;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        .placar {
            font-size: 24px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <div class="placar">Pontos: <span id="pontos">0</span></div>
    <canvas id="gameCanvas"></canvas>

    <script>
        // JS: A lógica do jogo
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const spanPontos = document.getElementById("pontos");

        canvas.width = 400;
        canvas.height = 500;

        let jogador = { x: 180, y: 440, tam: 40, vel: 7 };
        let interrogacoes = [];
        let pontos = 0;
        let jogoAtivo = true;
        let teclas = {};

        // Detecta teclas pressionadas
        window.addEventListener("keydown", (e) => teclas[e.key] = true);
        window.addEventListener("keyup", (e) => teclas[e.key] = false);

        function criarInterrogacao() {
            if (Math.random() < 0.03) { // Chance de aparecer a cada frame
                interrogacoes.push({
                    x: Math.random() * (canvas.width - 20),
                    y: -20,
                    vel: 3 + (pontos / 10) // Fica mais rápido com o tempo!
                });
            }
        }

        function atualizar() {
            if (!jogoAtivo) return;

            // Movimento do quadrado
            if (teclas["ArrowLeft"] && jogador.x > 0) jogador.x -= jogador.vel;
            if (teclas["ArrowRight"] && jogador.x < canvas.width - jogador.tam) jogador.x += jogador.vel;

            interrogacoes.forEach((p, index) => {
                p.y += p.vel;

                // Colisão (Quadrado morre)
                if (p.y + 20 > jogador.y && p.x > jogador.x && p.x < jogador.x + jogador.tam) {
                    jogoAtivo = false;
                    alert("Game Over! Você fez " + pontos + " pontos.");
                    location.reload(); // Reinicia o jogo
                }

                // Ponto (Chegou no fim da tela)
                if (p.y > canvas.height) {
                    interrogacoes.splice(index, 1);
                    pontos++;
                    spanPontos.innerText = pontos;
                }
            });

            criarInterrogacao();
        }

        function desenhar() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Desenha Jogador
            ctx.fillStyle = "#00ff88";
            ctx.fillRect(jogador.x, jogador.y, jogador.tam, jogador.tam);

            // Desenha Interrogações
            ctx.fillStyle = "#ff4444";
            ctx.font = "30px Arial";
            interrogacoes.forEach(p => {
                ctx.fillText("?", p.x, p.y);
            });

            atualizar();
            requestAnimationFrame(desenhar);
        }

        desenhar();
    </script>
</body>
</html>
